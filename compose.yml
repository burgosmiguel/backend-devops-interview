services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: backend_devops_interview
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15
    networks:
      - backend

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: backend_devops_interview
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - backend

networks:
  backend:

volumes:
  pgdata:
